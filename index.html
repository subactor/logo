<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subactor — logo i materiały marki</title>
  <meta name="description" content="Oficjalne logo, ikony i materiały społecznościowe Subactor.">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #0b1017; color: #eef4fb; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
    main { width: min(920px, calc(100% - 3rem)); padding: 4rem 0; }
    h1 { margin: 0 0 .75rem; font-size: clamp(2rem, 7vw, 4.5rem); letter-spacing: -.05em; }
    p { color: #aebdce; max-width: 56ch; line-height: 1.65; }
    .mark { width: 112px; height: 112px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-top: 2.5rem; }
    a { color: inherit; text-decoration: none; border: 1px solid #26364a; border-radius: 16px; padding: 1.25rem; background: #111a25; }
    a:hover { border-color: #4da3ff; }
    strong { display: block; margin-bottom: .4rem; }
    small { color: #8da0b5; }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="icons/android-chrome-192x192.png" alt="Logo Subactor">
    <h1>Subactor brand assets</h1>
    <p>Oficjalny zestaw logo, ikon aplikacji i grafik społecznościowych. Zasady użycia znajdują się w licencji materiałów marki.</p>
    <section class="grid" aria-label="Materiały do pobrania">
      <a href="icons/favicon.svg"><strong>Logo SVG</strong><small>Wektorowa wersja znaku</small></a>
      <a href="social/subactor-og-image.png"><strong>Open Graph</strong><small>Grafika do udostępnień</small></a>
      <a href="social/subactor-square-social.png"><strong>Square social</strong><small>Kwadratowy materiał social</small></a>
      <a href="LICENSE-BRAND-ASSETS.md"><strong>Licencja</strong><small>Zasady korzystania z materiałów</small></a>
    </section>
  </main>
</body>
</html>
